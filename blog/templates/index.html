{% load static %}

<!DOCTYPE html>
<html lang="">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width,initial-scale=1">

    <!-- Favicon if you have one in static/vue/ -->
    <link rel="icon" href="{% static 'vue/favicon.ico' %}">

    <title>blog-vue</title>

    <!-- CSS -->
    <link href="{% static 'vue/css/app.css' %}" rel="stylesheet">

    <!-- If you disabled filenameHashing: false, use these fixed names -->
    <script defer src="{% static 'vue/js/chunk-vendors.js' %}"></script>
    <script defer src="{% static 'vue/js/app.js' %}"></script>

    <!-- 
      IMPORTANT: If you KEEP filename hashing (default), 
      rebuild → check new hashes in static/vue/js/ → update the lines below:
      e.g. <script defer src="{% static 'vue/js/chunk-vendors.7761c97e.js' %}"></script>
    -->
  </head>

  <body>
    <noscript>
      <strong>
        We're sorry but blog-vue doesn't work properly without JavaScript enabled.
        Please enable it to continue.
      </strong>
    </noscript>

    <div id="app"></div>
  </body>
</html>
